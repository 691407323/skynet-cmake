name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure build PATH
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake --preset x64-debug

    - name: Build
      run: cmake --build out/build/x64-debug

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path package -Force
        Get-ChildItem out/build/x64-debug -File | Copy-Item -Destination package/
        Get-ChildItem out/build/x64-debug -Directory | Copy-Item -Destination package/ -Recurse
        Compress-Archive -Path package/* -DestinationPath skynet-windows-x64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: skynet-windows-x64
        path: skynet-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libreadline-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DRP3D_OPENSSL_LIB_DIR=${{ github.workspace }}/luaclib-src/openssl/lib/linux

    - name: Build
      run: cmake --build build

    - name: Package
      run: |
        mkdir -p package
        cp -r build/* package/
        cd package && zip -r ../skynet-linux-x64.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: skynet-linux-x64
        path: skynet-linux-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DRP3D_OPENSSL_LIB_DIR=${{ github.workspace }}/luaclib-src/openssl/lib/mac

    - name: Build
      run: cmake --build build

    - name: Package
      run: |
        mkdir -p package
        cp -r build/* package/
        cd package && zip -r ../skynet-macos-x64.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: skynet-macos-x64
        path: skynet-macos-x64.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
